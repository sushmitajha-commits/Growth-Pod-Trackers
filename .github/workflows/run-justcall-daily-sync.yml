name: Run JustCall Sync Daily 6:30AM UTC

on:
  schedule:
    - cron: '30 6 * * *'  # Runs at 06:30 UTC daily
  workflow_dispatch:

concurrency:
  group: justcall-daily-sync
  cancel-in-progress: false

jobs:
  run-notebook:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jupyter nbconvert ipykernel pandas sqlalchemy psycopg2-binary requests python-dotenv

      - name: Execute notebook
        run: |
          jupyter nbconvert \
            --to notebook \
            --execute BurnerCallDailyStats.ipynb \
            --output BurnerCallDailyStats.output.ipynb \
            --ExecutePreprocessor.timeout=3600

      - name: Export HTML (optional)
        run: |
          jupyter nbconvert \
            --to html \
            --output BurnerCallDailyStats.output.html \
            BurnerCallDailyStats.output.ipynb

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: justcall-daily-sync-output
          path: |
            BurnerCallDailyStats.output.ipynb
            BurnerCallDailyStats.output.html
